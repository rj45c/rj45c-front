<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.8
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem
        }

        .meta {
            color: #666;
            margin: 1rem 0;
            font-size: 14px
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 12px
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            margin-right: 8px
        }

        .toc {
            border: 1px solid #eee;
            padding: 1rem;
            border-radius: 8px;
            margin: 2rem 0;
            background: #fafafa
        }

        .toc h3 {
            margin: 0 0 0.5rem;
            font-size: 1rem
        }

        .toc ul {
            padding-left: 1.2rem;
            margin: 0
        }

        .toc li {
            margin: 0.3rem 0
        }

        a {
            color: #165DFF;
            text-decoration: none
        }

        .error {
            color: #ff4d4f;
            margin-top: 2rem
        }
    </style>
</head>

<body>
    <a href="index.html">← 返回首页</a>
    <h1 id="title">加载中...</h1>
    <div class="meta" id="meta"></div>
    <div class="toc" id="toc"></div>
    <div id="content"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js'

        // 1. 获取文件参数，增加校验
        const file = new URLSearchParams(location.search).get('file')
        if (!file) {
            document.getElementById('title').textContent = '参数错误'
            document.getElementById('content').innerHTML = '<p class="error">文章参数缺失，请从首页点击进入</p>'
            throw new Error('文件参数缺失')
        }

        // 2. 增强版加载逻辑，处理404
        async function loadPost() {
            try {
                const res = await fetch(`/posts/${file}`)
                if (!res.ok) {
                    throw new Error(`HTTP error! status: ${res.status}`)
                }
                const text = await res.text()
                const { data, content } = parsePostFrontmatter(text)

                // 3. 渲染标题（兜底处理）
                document.getElementById('title').textContent = data.title || '无标题'

                // 4. 渲染元信息（兜底处理）
                let metaHtml = data.date || ''
                if (data.category) metaHtml += ` <span class="category">${data.category}</span>`
                if (data.tags && data.tags.length > 0) {
                    metaHtml += ' ' + data.tags.map(t => `<span class="tag">${t}</span>`).join('')
                }
                document.getElementById('meta').innerHTML = metaHtml

                // 5. 生成目录（仅提取正文标题）
                const html = marked.parse(content)
                const temp = document.createElement('div')
                temp.innerHTML = html
                const heads = temp.querySelectorAll('h1,h2,h3')

                if (heads.length > 0) {
                    let toc = '<h3>目录</h3><ul>'
                    heads.forEach((h, i) => {
                        const id = `heading-${i}`
                        h.id = id
                        toc += `<li><a href="#${id}">${h.textContent}</a></li>`
                    })
                    toc += '</ul>'
                    document.getElementById('toc').innerHTML = toc
                } else {
                    document.getElementById('toc').style.display = 'none'
                }

                // 6. 渲染正文
                document.getElementById('content').innerHTML = temp.innerHTML

            } catch (e) {
                console.error('加载失败:', e)
                document.getElementById('title').textContent = '加载失败'
                document.getElementById('content').innerHTML = `
      <p class="error">文章加载失败，请检查：</p>
      <ul class="error">
        <li>posts/ 文件夹是否存在，且与 index.html 同级</li>
        <li>文件 ${file} 是否存在于 posts/ 目录下</li>
        <li>文件名大小写是否完全一致</li>
      </ul>
    `
            }
        }

        loadPost()
    </script>
</body>

</html>
