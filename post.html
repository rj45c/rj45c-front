<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>文章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.8;
            background: #f9fafb;
            color: #111827;
        }

        .back {
            display: inline-block;
            margin-bottom: 1rem;
            color: #165DFF;
            text-decoration: none;
            font-size: 14px;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.8rem;
            line-height: 1.4;
            font-weight: 700;
        }

        .meta {
            color: #6b7280;
            margin: 1rem 0;
            font-size: 14px;
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 3px 8px;
            border-radius: 6px;
            margin-right: 6px;
            font-size: 12px;
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            margin-right: 8px;
        }

        .toc {
            border: 1px solid #eee;
            padding: 1.2rem;
            border-radius: 10px;
            margin: 2rem 0;
            background: #fff;
        }

        .toc h3 {
            margin: 0 0 0.6rem;
            font-size: 1rem;
            color: #374151;
        }

        .toc ul {
            padding-left: 1.2rem;
            margin: 0;
        }

        .toc li {
            margin: 0.4rem 0;
        }

        a {
            color: #165DFF;
            text-decoration: none;
        }

        #content {
            margin-top: 1rem;
            line-height: 1.9;
            font-size: 16px;
        }

        #content h1,
        #content h2,
        #content h3 {
            margin: 1.5rem 0 1rem;
        }

        #content p {
            margin: 1rem 0;
        }

        /* 🔥 核心修复：图片自适应样式 */
        #content img {
            max-width: 100%;
            height: auto;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin: 1.5rem 0;
            cursor: zoom-in;
            transition: transform 0.2s ease;
        }

        #content img:hover {
            transform: scale(1.01);
        }

        /* 图片查看器遮罩 */
        .image-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 9999;
            cursor: zoom-out;
        }

        .image-viewer img {
            max-width: 95%;
            max-height: 95%;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .error {
            color: #ff4d4f;
            margin-top: 2rem;
        }
    </style>
</head>

<body>
    <a href="index.html" class="back">← 返回首页</a>
    <h1 id="title">加载中...</h1>
    <div class="meta" id="meta"></div>
    <div class="toc" id="toc"></div>
    <div id="content"></div>

    <!-- 图片查看器 -->
    <div class="image-viewer" id="imageViewer">
        <img src="" alt="大图查看" id="viewerImg">
    </div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>

    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js'
        const file = new URLSearchParams(location.search).get('file')

        if (!file || !file.endsWith('.md') || file.includes('..')) {
            document.getElementById('title').textContent = '无法访问'
            document.getElementById('content').innerHTML = '<p class="error">非法参数</p>'
            throw ''
        }

        async function loadPost() {
            try {
                const res = await fetch(`/posts/${file}`)
                if (!res.ok) throw new Error('文章不存在')
                const text = await res.text()
                const { data, content } = parsePostFrontmatter(text)

                document.getElementById('title').textContent = data.title
                document.title = data.title + ' - RJ45C'

                let metaHtml = data.date || ''
                if (data.category) metaHtml += ` <span class="category">${data.category}</span>`
                if (data.tags.length) metaHtml += ' ' + data.tags.map(t => `<span class="tag">${t}</span>`).join('')
                document.getElementById('meta').innerHTML = metaHtml

                const html = DOMPurify.sanitize(marked.parse(content))
                const temp = document.createElement('div')
                temp.innerHTML = html

                const heads = temp.querySelectorAll('h1,h2,h3')
                if (heads.length) {
                    let toc = '<h3>目录</h3><ul>'
                    heads.forEach((h, i) => {
                        h.id = `h${i}`
                        toc += `<li><a href="#h${i}">${h.textContent}</a></li>`
                    })
                    toc += '</ul>'
                    document.getElementById('toc').innerHTML = toc
                } else {
                    document.getElementById('toc').style.display = 'none'
                }

                document.getElementById('content').innerHTML = temp.innerHTML

                // 🔥 绑定图片点击放大事件
                const images = document.querySelectorAll('#content img')
                const viewer = document.getElementById('imageViewer')
                const viewerImg = document.getElementById('viewerImg')

                images.forEach(img => {
                    img.addEventListener('click', () => {
                        viewerImg.src = img.src
                        viewer.style.display = 'flex'
                        document.body.style.overflow = 'hidden'
                    })
                })

                // 点击遮罩关闭查看器
                viewer.addEventListener('click', () => {
                    viewer.style.display = 'none'
                    document.body.style.overflow = 'auto'
                })

                // ESC 键关闭查看器
                document.addEventListener('keydown', (e) => {
                    if (e.key === 'Escape' && viewer.style.display === 'flex') {
                        viewer.style.display = 'none'
                        document.body.style.overflow = 'auto'
                    }
                })

            } catch (e) {
                document.getElementById('title').textContent = '加载失败'
                document.getElementById('content').innerHTML = `<p class="error">${e.message}</p>`
            }
        }

        loadPost()
    </script>
</body>

</html>
