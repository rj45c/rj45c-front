<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>文章</title>
    <style>
        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.8
        }

        h1 {
            font-size: 1.6rem;
            margin-bottom: 0.5rem
        }

        .meta {
            color: #666;
            margin: 1rem 0;
            font-size: 14px
        }

        .tag {
            background: #f4f5f7;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 12px
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
            margin-right: 8px
        }

        .toc {
            border: 1px solid #eee;
            padding: 1rem;
            border-radius: 8px;
            margin: 2rem 0;
            background: #fafafa
        }

        .toc h3 {
            margin: 0 0 0.5rem;
            font-size: 1rem
        }

        .toc ul {
            padding-left: 1.2rem;
            margin: 0
        }

        .toc li {
            margin: 0.3rem 0
        }

        a {
            color: #165DFF;
            text-decoration: none
        }

        .error {
            color: #ff4d4f;
            margin-top: 2rem
        }
    </style>
</head>

<body>
    <a href="index.html">← 返回首页</a>
    <h1 id="title">加载中...</h1>
    <div class="meta" id="meta"></div>
    <div class="toc" id="toc"></div>
    <div id="content"></div>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify@3/dist/purify.min.js"></script>
    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js'
        const file = new URLSearchParams(location.search).get('file')
        if (!file) {
            document.getElementById('title').textContent = '参数错误'
            document.getElementById('content').innerHTML = '<p class="error">请从首页进入</p>'
            throw ''
        }

        // 安全校验
        if (!file.endsWith('.md') || file.includes('../')) {
            document.getElementById('title').textContent = '非法访问'
            document.getElementById('content').innerHTML = '<p class="error">非法文件路径</p>'
            throw ''
        }

        async function load() {
            try {
                const res = await fetch(`/posts/${file}`)
                if (!res.ok) throw new Error('文件不存在')
                const text = await res.text()
                const { data, content } = parsePostFrontmatter(text)

                document.getElementById('title').textContent = data.title
                let meta = data.date || ''
                if (data.category) meta += ` <span class="category">${data.category}</span>`
                if (data.tags.length) meta += ' ' + data.tags.map(t => `<span class="tag">${t}</span>`).join('')
                document.getElementById('meta').innerHTML = meta

                const html = DOMPurify.sanitize(marked.parse(content))
                const temp = document.createElement('div')
                temp.innerHTML = html
                const heads = temp.querySelectorAll('h1,h2,h3')

                if (heads.length) {
                    let toc = '<h3>目录</h3><ul>'
                    heads.forEach((h, i) => { h.id = `h${i}`; toc += `<li><a href="#h${i}">${h.textContent}</a></li>` })
                    document.getElementById('toc').innerHTML = toc + '</ul>'
                } else {
                    document.getElementById('toc').style.display = 'none'
                }
                document.getElementById('content').innerHTML = temp.innerHTML
            } catch (e) {
                document.getElementById('title').textContent = '加载失败'
                document.getElementById('content').innerHTML = `<p class="error">${e.message}</p>`
            }
        }
        load()
    </script>
</body>

</html>
