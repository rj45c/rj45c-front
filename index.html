                content: `# 2024年 JavaScript 开发实用技巧

JavaScript 生态不断发展，掌握这些技巧可以让你的代码更加优雅和高效。

## 1. 可选链操作符

\`\`\`javascript
const user = {
  profile: {
    address: {
      city: 'Beijing'
    }
  }
};

// 传统写法
const city = user.profile && user.profile.address && user.profile.address.city;

// 现代写法 - 可选链
const city = user?.profile?.address?.city;
\`\`\`

## 2. 空值合并操作符

\`\`\`javascript
// 传统写法
const name = user.name !== null && user.name !== undefined ? user.name : 'Guest';

// 现代写法 - 空值合并
const name = user.name ?? 'Guest';

// 注意：与 || 不同，?? 只在 null/undefined 时生效
const count = 0;
console.log(count || 10);    // 10 (0 被视为 false)
console.log(count ?? 10);    // 0  (0 是有效值)
\`\`\`

## 3. 结构化克隆

\`\`\`javascript
// 深拷贝对象
const original = { a: 1, b: { c: 2 } };
const cloned = structuredClone(original);

// 修改克隆对象不影响原对象
cloned.b.c = 3;
console.log(original.b.c); // 2
\`\`\`

## 4. Promise.allSettled

\`\`\`javascript
const promises = [
  fetch('/api/data1'),
  fetch('/api/data2'),
  fetch('/api/data3')
];

const results = await Promise.allSettled(promises);

results.forEach((result, index) => {
  if (result.status === 'fulfilled') {
    console.log(\`请求 \${index + 1} 成功:\`, result.value);
  } else {
    console.log(\`请求 \${index + 1} 失败:\`, result.reason);
  }
});
\`\`\`

## 5. Array.at() 方法

\`\`\`javascript
const arr = [1, 2, 3, 4, 5];

// 获取最后一个元素

\`\`\`dockerfile
# 使用 Node.js 官方镜像

# 安装依赖

# 复制源代码

# 构建应用
RUN npm run build

# 生产环境
FROM node:20-alpine

WORKDIR /app

# 复制构建产物
COPY --from=builder /app/dist ./dist
COPY --from=builder /app/node_modules ./node_modules

# 暴露端口

# 启动命令

\`\`\`yaml
version: '3.8'

        function generateTOC(markdown) {
            const toc = [];
            const lines = markdown.split('\n');

            for (const line of lines) {
                const match = line.match(/^(#{2,4})\s+(.+)$/);
                if (match) {
                    const level = match[1].length - 1;
                    const title = match[2].replace(/[*_~`]/g, '').trim();
                    const slug = title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w-]/g, '');
                    toc.push({ level, title, slug });
                }
            }

            return toc;
        }

        function smoothScrollTo(id) {
            event.preventDefault();
            const element = document.getElementById(id);
            if (element) {
                element.scrollIntoView({ behavior: 'smooth', block: 'start' });

        // ==================== SEARCH ====================
        function toggleSearch() {
            const modal = document.getElementById('searchModal');
            modal.classList.toggle('hidden');
            if (!modal.classList.contains('hidden')) {
                document.getElementById('searchInput').focus();
            }
        }

        function performSearch(query) {
            const resultsContainer = document.getElementById('searchResults');

            if (!query.trim()) {
                resultsContainer.innerHTML = `
      <div class="text-center py-12 text-slate-500">
        <svg class="w-12 h-12 mx-auto mb-3 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
        <p>输入关键词搜索文章</p>
      </div>
    `;
                return;
            }

            const q = query.toLowerCase();
            const results = searchIndex.filter(post =>
                post.title.toLowerCase().includes(q) ||
                post.description.toLowerCase().includes(q) ||
                post.content.toLowerCase().includes(q) ||
                post.tags.some(t => t.toLowerCase().includes(q))
            );

            if (results.length === 0) {
                resultsContainer.innerHTML = `
      <div class="text-center py-12 text-slate-500">
        <p>未找到相关结果</p>
      </div>
    `;
                return;
            }

            resultsContainer.innerHTML = results.map(post => `
    <div class="search-result p-4 rounded-xl cursor-pointer transition-colors" onclick="navigateTo('/post/${post.slug}');toggleSearch()">
      <h3 class="font-semibold text-slate-800 dark:text-white mb-1">${highlightText(post.title, query)}</h3>
      <p class="text-sm text-slate-500 dark:text-slate-400 line-clamp-1">${highlightText(post.description || '', query)}</p>
      <div class="flex items-center gap-2 mt-2">
        <span class="text-xs text-slate-400">${formatDate(post.date)}</span>
        ${post.tags.slice(0, 2).map(tag => `<span class="text-xs px-2 py-0.5 bg-slate-100 dark:bg-slate-800 text-slate-500 rounded">${tag}</span>`).join('')}
      </div>
    </div>
  `).join('');
        }

        function highlightText(text, query) {
            if (!query) return text;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return text.replace(regex, '<mark class="bg-yellow-200 dark:bg-yellow-800 px-1 rounded">$1</mark>');
        }

        function handleKeyboard(e) {
            if (e.key === 'Escape') {
                const modal = document.getElementById('searchModal');
                if (!modal.classList.contains('hidden')) {
                    toggleSearch();
                }
            }
            if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
                e.preventDefault();
                toggleSearch();
            }
        }

        // ==================== UTILITIES ====================
        function formatDate(dateStr) {
            const date = new Date(dateStr);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        }

        function updateReadingProgress() {
            const postContent = document.querySelector('.prose');
            if (!postContent) return;

            const rect = postContent.getBoundingClientRect();
            const totalHeight = postContent.offsetHeight;
            const scrolled = window.innerHeight - rect.top;
            const progress = Math.min(Math.max((scrolled / totalHeight) * 100, 0), 100);

            document.getElementById('readingProgressBar').style.width = `${progress}%`;
        }

        function toggleMobileMenu() {
            document.getElementById('mobileMenu').classList.toggle('hidden');
        }

        function closeMobileMenu() {
            document.getElementById('mobileMenu').classList.add('hidden');
        }

            gfm: true,
            headerIds: true,
            mangle: false,
        });
