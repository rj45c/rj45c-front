<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的博客</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.7
        }

        .post-item {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            margin-bottom: 1rem
        }

        .post-item h2 {
            margin: 0 0 0.5rem;
            font-size: 1.3rem
        }

        .post-item a {
            color: #165DFF;
            text-decoration: none
        }

        .meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 0.5rem
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 12px
        }

        .pagination {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            align-items: center;
            justify-content: center
        }

        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer
        }

        .pagination button:disabled {
            opacity: 0.4
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px
        }

        .excerpt {
            color: #333;
            margin-top: 0.5rem
        }

        .empty {
            text-align: center;
            color: #888;
            padding: 3rem 0
        }
    </style>
</head>

<body>
    <h1>博客</h1>
    <div id="list"></div>
    <div class="pagination">
        <button id="prev">上一页</button>
        <span id="page-info"></span>
        <button id="next">下一页</button>
    </div>

    <script type="module">
        import { postsList } from './posts-list.js'
        const POSTS_PER_PAGE = 5
        let currentPage = 1
        let allPosts = [...postsList]

        function render() {
            const total = Math.max(1, Math.ceil(allPosts.length / POSTS_PER_PAGE))
            const start = (currentPage - 1) * POSTS_PER_PAGE
            const pageData = allPosts.slice(start, start + POSTS_PER_PAGE)

            document.getElementById('page-info').innerText = `第 ${currentPage} / ${total} 页`
            document.getElementById('prev').disabled = currentPage <= 1
            document.getElementById('next').disabled = currentPage >= total

            if (allPosts.length === 0) {
                document.getElementById('list').innerHTML = '<div class="empty">暂无文章</div>'
                return
            }

            const html = pageData.map(p => `
    <div class="post-item">
      <h2><a href="post.html?file=${encodeURIComponent(p.file)}">${p.title}</a></h2>
      <div class="meta">
        ${p.date} ${p.category ? `<span class="category">${p.category}</span>` : ''}
      </div>
      ${p.tags?.map(t => `<span class="tag">${t}</span>`).join('') || ''}
      <div class="excerpt">${p.excerpt}</div>
    </div>
  `).join('')

            document.getElementById('list').innerHTML = html
        }

        document.getElementById('prev').onclick = () => { currentPage--; render() }
        document.getElementById('next').onclick = () => { currentPage++; render() }
        render()
    </script>
</body>

</html>
