<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJ45C</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1rem;
            line-height: 1.7;
            background: #f9fafb;
            color: #111827;
        }

        .title {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: #111827;
        }

        /* 搜索框样式 */
        .search-container {
            margin-bottom: 2rem;
            position: relative;
        }

        #search-input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 16px;
            background: #fff;
            transition: all 0.2s;
        }

        #search-input:focus {
            outline: none;
            border-color: #165DFF;
            box-shadow: 0 0 0 3px rgba(22, 93, 255, 0.1);
        }

        .search-hint {
            margin-top: 8px;
            font-size: 14px;
            color: #6b7280;
        }

        .post-item {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            border-color: #e0e0e0;
        }

        .post-item h2 {
            margin: 0 0 0.5rem;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .post-item a {
            color: #165DFF;
            text-decoration: none;
        }

        .meta {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 0.5rem;
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 3px 8px;
            border-radius: 6px;
            margin-right: 6px;
            font-size: 12px;
            color: #4b5563;
        }

        .pagination {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            align-items: center;
            justify-content: center;
        }

        .pagination button {
            padding: 0.6rem 1.2rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #165DFF;
            color: #fff;
            border-color: #165DFF;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
        }

        .excerpt {
            color: #374151;
            margin-top: 0.5rem;
            line-height: 1.7;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }

        .highlight {
            background: #fff3cd;
            padding: 0 2px;
            border-radius: 2px;
        }
    </style>
</head>

<body>
    <h1 class="title">博客</h1>

    <!-- 搜索框 -->
    <div class="search-container">
        <input id="search-input" placeholder="搜索标题、标签、摘要…" autocomplete="off" />
        <div class="search-hint" id="search-hint"></div>
    </div>

    <div id="list"></div>

    <div class="pagination">
        <button id="prev">上一页</button>
        <span id="page-info"></span>
        <button id="next">下一页</button>
    </div>

    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js'
        import { postsList } from './posts-list.js'

        const POSTS_PER_PAGE = 5;
        let currentPage = 1;
        let allPosts = []; // 存储完整的原始文章数据
        let filteredPosts = []; // 存储过滤后的结果

        // 🌟 核心修复：通用的搜索匹配函数
        function matchesSearch(post, query) {
            if (!query) return true;

            const keywords = query.toLowerCase().split(/\s+/); // 支持多关键词搜索
            const title = (post.title || '').toLowerCase();
            const category = (post.category || '').toLowerCase();
            const excerpt = (post.excerpt || '').toLowerCase();

            // 处理标签：如果是数组直接取，否则假设是字符串
            const tags = Array.isArray(post.tags) ? post.tags.join(' ').toLowerCase() : (post.tags || '').toLowerCase();

            // 遍历所有关键词，只要命中一个字段即返回 true
            return keywords.some(keyword => {
                return title.includes(keyword) ||
                    category.includes(keyword) ||
                    tags.includes(keyword) ||
                    excerpt.includes(keyword);
            });
        }

        // 加载所有文章
        async function loadPosts() {
            const posts = [];
            for (const item of postsList) {
                try {
                    const res = await fetch(`/posts/${item.file}`);
                    if (!res.ok) {
                        console.warn(`跳过无法加载的文件: ${item.file}`);
                        continue;
                    }
                    const text = await res.text();
                    const { data } = parsePostFrontmatter(text);
                    // 确保 file 字段存在，用于跳转
                    posts.push({ ...data, file: item.file });
                } catch (e) {
                    console.error(`加载文章 ${item.file} 失败:`, e);
                }
            }

            allPosts = posts.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0));
            filteredPosts = [...allPosts];

            // 初始化渲染
            render();
            console.log(`✅ 成功加载 ${allPosts.length} 篇文章，搜索功能已就绪`);
        }

        // 渲染列表
        function render() {
            const total = Math.ceil(filteredPosts.length / POSTS_PER_PAGE) || 1;
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pageData = filteredPosts.slice(start, start + POSTS_PER_PAGE);

            document.getElementById('page-info').innerText = `第 ${currentPage} / ${total} 页`;
            document.getElementById('prev').disabled = currentPage <= 1;
            document.getElementById('next').disabled = currentPage >= total;

            if (filteredPosts.length === 0) {
                document.getElementById('list').innerHTML = '<div class="empty">暂无文章</div>';
                return;
            }

            const searchKeyword = document.getElementById('search-input').value.trim();

            document.getElementById('list').innerHTML = pageData.map(p => {
                let title = p.title;
                let excerpt = p.excerpt || '';

                // 高亮处理
                if (searchKeyword) {
                    const reg = new RegExp(`(${searchKeyword})`, 'gi');
                    title = title.replace(reg, '<span class="highlight">$1</span>');
                    excerpt = excerpt.replace(reg, '<span class="highlight">$1</span>');
                }

                return `
                <div class="post-item">
                    <h2><a href="post.html?file=${encodeURIComponent(p.file)}">${title}</a></h2>
                    <div class="meta">
                        ${p.date} ${p.category ? `<span class="category">${p.category}</span>` : ''}
                    </div>
                    ${p.tags?.map(t => `<span class="tag">${t}</span>`).join('') || ''}
                    <div class="excerpt">${excerpt}</div>
                </div>
            `;
            }).join('');
        }

        // 🔍 搜索事件监听
        document.getElementById('search-input').addEventListener('input', function (e) {
            const keyword = e.target.value.trim();

            if (keyword === '') {
                // 清空搜索，恢复原始数据
                filteredPosts = [...allPosts];
                document.getElementById('search-hint').innerText = '';
            } else {
                // 执行过滤
                filteredPosts = allPosts.filter(post => matchesSearch(post, keyword));
                document.getElementById('search-hint').innerText = `找到 ${filteredPosts.length} 条结果`;
            }

            // 搜索后重置到第一页
            currentPage = 1;
            render();
        });

        // 分页事件
        document.getElementById('prev').onclick = () => { currentPage--; render(); };
        document.getElementById('next').onclick = () => { currentPage++; render(); };

        // 初始加载
        loadPosts();
    </script>
</body>

</html>
