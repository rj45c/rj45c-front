<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RJ45C</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 3rem 1rem;
            line-height: 1.7;
            background: #f9fafb;
            color: #111827;
        }

        .title {
            font-size: 2rem;
            margin-bottom: 2rem;
            font-weight: 700;
            color: #111827;
        }

        .post-item {
            background: #fff;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border: 1px solid #f0f0f0;
            transition: all 0.2s ease;
        }

        .post-item:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
            border-color: #e0e0e0;
        }

        .post-item h2 {
            margin: 0 0 0.5rem;
            font-size: 1.3rem;
            font-weight: 600;
        }

        .post-item a {
            color: #165DFF;
            text-decoration: none;
        }

        .meta {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 0.5rem;
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 3px 8px;
            border-radius: 6px;
            margin-right: 6px;
            font-size: 12px;
            color: #4b5563;
        }

        .pagination {
            display: flex;
            gap: 1rem;
            margin-top: 2.5rem;
            align-items: center;
            justify-content: center;
        }

        .pagination button {
            padding: 0.6rem 1.2rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pagination button:hover:not(:disabled) {
            background: #165DFF;
            color: #fff;
            border-color: #165DFF;
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px;
        }

        .excerpt {
            color: #374151;
            margin-top: 0.5rem;
            line-height: 1.7;
        }

        .empty {
            text-align: center;
            color: #999;
            padding: 3rem 0;
        }
    </style>
</head>

<body>
    <h1 class="title">RJ45C</h1>
    <div id="list"></div>

    <div class="pagination">
        <button id="prev">上一页</button>
        <span id="page-info"></span>
        <button id="next">下一页</button>
    </div>

    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js'
        import { postsList } from './posts-list.js'

        const POSTS_PER_PAGE = 5
        let currentPage = 1
        let allPosts = []

        async function loadPosts() {
            const posts = []
            for (const item of postsList) {
                try {
                    const res = await fetch(`/posts/${item.file}`)
                    if (!res.ok) continue
                    const text = await res.text()
                    const { data } = parsePostFrontmatter(text)
                    posts.push({ ...data, file: item.file })
                } catch (e) { }
            }
            allPosts = posts.sort((a, b) => new Date(b.date || 0) - new Date(a.date || 0))
            render()
        }

        function render() {
            const total = Math.ceil(allPosts.length / POSTS_PER_PAGE) || 1
            const start = (currentPage - 1) * POSTS_PER_PAGE
            const pageData = allPosts.slice(start, start + POSTS_PER_PAGE)

            document.getElementById('page-info').innerText = `第 ${currentPage} / ${total} 页`
            document.getElementById('prev').disabled = currentPage <= 1
            document.getElementById('next').disabled = currentPage >= total

            if (allPosts.length === 0) {
                document.getElementById('list').innerHTML = '<div class="empty">暂无文章</div>'
                return
            }

            document.getElementById('list').innerHTML = pageData.map(p => `
                <div class="post-item">
                    <h2><a href="post.html?file=${encodeURIComponent(p.file)}">${p.title}</a></h2>
                    <div class="meta">
                        ${p.date} ${p.category ? `<span class="category">${p.category}</span>` : ''}
                    </div>
                    ${p.tags?.map(t => `<span class="tag">${t}</span>`).join('') || ''}
                    <div class="excerpt">${p.excerpt}</div>
                </div>
            `).join('')
        }

        document.getElementById('prev').onclick = () => { currentPage--; render() }
        document.getElementById('next').onclick = () => { currentPage++; render() }

        loadPosts()
    </script>
</body>

</html>
