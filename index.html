<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的博客</title>
    <style>
        * {
            box-sizing: border-box
        }

        body {
            font-family: -apple-system, system-ui, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 1rem;
            line-height: 1.7
        }

        .post-item {
            border-bottom: 1px solid #eee;
            padding: 1rem 0;
            margin-bottom: 1rem
        }

        .post-item h2 {
            margin: 0 0 0.5rem;
            font-size: 1.3rem
        }

        .post-item a {
            color: #165DFF;
            text-decoration: none
        }

        .meta {
            color: #666;
            font-size: 14px;
            margin-bottom: 0.5rem
        }

        .tag {
            display: inline-block;
            background: #f4f5f7;
            padding: 2px 8px;
            border-radius: 4px;
            margin-right: 6px;
            font-size: 12px
        }

        .pagination {
            display: flex;
            gap: 1rem;
            margin-top: 2rem;
            align-items: center;
            justify-content: center
        }

        .pagination button {
            padding: 0.5rem 1rem;
            border: 1px solid #ddd;
            background: #fff;
            border-radius: 6px;
            cursor: pointer
        }

        .pagination button:disabled {
            opacity: 0.4;
            cursor: not-allowed
        }

        .category {
            background: #e8f3ff;
            color: #165DFF;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 13px
        }

        .excerpt {
            color: #333;
            margin-top: 0.5rem;
            line-height: 1.6
        }
    </style>
</head>

<body>
    <h1>博客</h1>
    <div id="list"></div>
    <div class="pagination">
        <button id="prev">上一页</button>
        <span id="page-info"></span>
        <button id="next">下一页</button>
    </div>

    <script type="module">
        import { parsePostFrontmatter } from './utils/parser.js';

        const POSTS_PER_PAGE = 5;
        let currentPage = 1;
        let allPosts = [];

        // 兼容本地+线上的文章列表获取
        async function loadAllPosts() {
            // 线上环境：自动读取目录
            if (window.location.host !== '127.0.0.1:5500') {
                try {
                    const res = await fetch('/posts/');
                    const text = await res.text();
                    const doc = new DOMParser().parseFromString(text, 'text/html');
                    const files = Array.from(doc.querySelectorAll('a[href$=".md"]'))
                        .map(a => a.textContent.trim())
                        .filter(f => f.endsWith('.md'));
                    return await loadPostsFromFiles(files);
                } catch (e) {
                    console.error('线上目录读取失败，切换本地方案', e);
                }
            }

            // 本地调试：手动维护文章列表（替换为你本地的md文件名）
            const localFiles = [
                'aaaa.md',
                'aaaa copy 2.md',
                'aaaa copy 3.md',
                'aaaa copy 4.md',
                'aaaa copy 5.md',
                'aaaa copy 6.md',
                'aaaa copy 7.md',
                'aaaa copy 8.md',
                'aaaa copy 9.md',
                'aaaa copy 10.md',
                'aaaa copy 11.md',
                'aaaa copy 12.md',
                'aaaa copy 13.md',
                'aaaa copy 14.md',
                'aaaa copy 15.md',

            ];
            return await loadPostsFromFiles(localFiles);
        }

        // 通用文章加载逻辑
        async function loadPostsFromFiles(files) {
            const posts = [];
            for (const file of files) {
                try {
                    const r = await fetch(`/posts/${file}`);
                    if (!r.ok) continue;
                    const md = await r.text();
                    const { data, content } = parsePostFrontmatter(md);

                    // 自动生成摘要（如果没有excerpt）
                    const excerpt = data.excerpt || content.replace(/^#.*\n/, '').slice(0, 120) + '...';

                    posts.push({
                        file,
                        title: data.title || file.replace('.md', ''),
                        date: data.date || '',
                        category: data.category || '',
                        tags: data.tags || [],
                        excerpt,
                        content
                    });
                } catch (e) {
                    console.error(`加载文章 ${file} 失败:`, e);
                }
            }

            // 按日期倒序排列（无日期的放最后）
            return posts.sort((a, b) => {
                const dateA = a.date ? new Date(a.date).getTime() : 0;
                const dateB = b.date ? new Date(b.date).getTime() : 0;
                return dateB - dateA;
            });
        }

        function render() {
            const totalPages = Math.max(1, Math.ceil(allPosts.length / POSTS_PER_PAGE));
            const start = (currentPage - 1) * POSTS_PER_PAGE;
            const pagePosts = allPosts.slice(start, start + POSTS_PER_PAGE);

            document.getElementById('page-info').textContent = `第 ${currentPage} / ${totalPages} 页`;
            document.getElementById('prev').disabled = currentPage <= 1;
            document.getElementById('next').disabled = currentPage >= totalPages;

            if (allPosts.length === 0) {
                document.getElementById('list').innerHTML = '<p>暂无文章，快去写第一篇吧~</p>';
                return;
            }

            const html = pagePosts.map(p => `
    <div class="post-item">
      <h2><a href="post.html?file=${encodeURIComponent(p.file)}">${p.title}</a></h2>
      <div class="meta">
        ${p.date || ''} 
        ${p.category ? `<span class="category">${p.category}</span>` : ''}
      </div>
      ${p.tags.length > 0 ? p.tags.map(t => `<span class="tag">${t}</span>`).join('') : ''}
      <div class="excerpt">${p.excerpt}</div>
    </div>
  `).join('');

            document.getElementById('list').innerHTML = html;
        }

        // 绑定分页事件
        document.getElementById('prev').addEventListener('click', () => {
            if (currentPage > 1) {
                currentPage--;
                render();
            }
        });
        document.getElementById('next').addEventListener('click', () => {
            if (currentPage < Math.max(1, Math.ceil(allPosts.length / POSTS_PER_PAGE))) {
                currentPage++;
                render();
            }
        });

        // 初始化
        (async () => {
            allPosts = await loadAllPosts();
            render();
        })();
    </script>
</body>

</html>
